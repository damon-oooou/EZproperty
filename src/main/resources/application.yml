spring:
  application:
    name: property-photos

  datasource:
    url: jdbc:postgresql://localhost:5432/property_photos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # v0.5.2:显式收紧上传上限(单张 15MB / 整个请求 100MB),上云后即账单保护
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 100MB

server:
  port: 8080

# v0.6 阶段 D:Actuator 只公开 health(UptimeRobot 探测用),其余端点一律不暴露
management:
  endpoints:
    web:
      exposure:
        include: health

# v0.6 阶段 D:Sentry。DSN 为空 = SDK 禁用(dev 默认),prod 由环境变量提供
sentry:
  dsn: ${SENTRY_DSN:}
  send-default-pii: false

file:
  upload-dir: uploads

# v0.6 阶段 B:对象存储(Cloudflare R2,S3 兼容)。
# 仅 prod profile 的 S3PhotoStorage 使用;dev 走 LocalPhotoStorage,不读这些值。
# 全部来自环境变量,无默认凭证。
storage:
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:}

# v0.5 JWT 配置。secret 仅供本地开发,生产环境必须用环境变量 JWT_SECRET 覆盖。
# v0.7:access 缩短到 30 分钟,配合数据库持久化的 refresh token(30 天滑动续期)。
jwt:
  secret: ${JWT_SECRET:ezproperty-dev-only-secret-key-change-in-production-0123456789}
  access-expiration-minutes: 30
  refresh-expiration-days: 30

# v0.5.1 Google 登录。Google Cloud Console 申请的 OAuth Client ID,
# 前后端用同一个(前端配在 frontend/.env.local 的 VITE_GOOGLE_CLIENT_ID)。
# 留空 = 未配置,/api/auth/google 返回错误,密码登录不受影响。
google:
  client-id: ${GOOGLE_CLIENT_ID:407202159942-dk99oti9nf45ne04bvdr8gmh8acjsks6.apps.googleusercontent.com}