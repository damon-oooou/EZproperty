spring:
  application:
    name: property-photos

  datasource:
    url: jdbc:postgresql://localhost:5432/property_photos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # v0.5.2:显式收紧上传上限(单张 15MB / 整个请求 100MB),上云后即账单保护
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 100MB

server:
  port: 8080

file:
  upload-dir: uploads

# v0.5 JWT 配置。secret 仅供本地开发,生产环境必须用环境变量 JWT_SECRET 覆盖。
jwt:
  secret: ${JWT_SECRET:ezproperty-dev-only-secret-key-change-in-production-0123456789}
  expiration-hours: 72

# v0.5.1 Google 登录。Google Cloud Console 申请的 OAuth Client ID,
# 前后端用同一个(前端配在 frontend/.env.local 的 VITE_GOOGLE_CLIENT_ID)。
# 留空 = 未配置,/api/auth/google 返回错误,密码登录不受影响。
google:
  client-id: ${GOOGLE_CLIENT_ID:407202159942-dk99oti9nf45ne04bvdr8gmh8acjsks6.apps.googleusercontent.com}