spring:
  application:
    name: property-photos

  datasource:
    url: jdbc:postgresql://localhost:5432/property_photos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

file:
  upload-dir: uploads