# v0.6 阶段 C:生产配置(Railway)。
# 原则:一切敏感值来自环境变量,无任何默认密钥;缺失即启动失败(fail fast)。
#
# Railway 需要设置的环境变量:
#   SPRING_PROFILES_ACTIVE=prod
#   DATABASE_URL   Railway PG 插件注入的 postgresql:// 连接串,
#                  由 DatabaseUrlEnvironmentPostProcessor 转换为 jdbc:postgresql:// + 用户名密码
#   JWT_SECRET     新生成的随机长密钥(>=64 字节)
#   GOOGLE_CLIENT_ID
#   R2_ENDPOINT / R2_ACCESS_KEY / R2_SECRET_KEY / R2_BUCKET   (见 application.yml storage.r2.*)
#   CORS_ALLOWED_ORIGINS   逗号分隔,先填 Vercel 生成域名,域名生效后换 https://app.<domain>

spring:
  jpa:
    show-sql: false
  # Flyway 保持开启(继承 application.yml):生产库首次部署自动从 V1 建到最新

server:
  port: ${PORT:8080}
  # 1GB 容器内存配比:Tomcat 默认 200 工作线程的栈内存是纯浪费,
  # 25 足够当前并发量,配合 -Xss512k 把线程栈开销压到 ~15MB
  tomcat:
    threads:
      max: 25

jwt:
  # 无默认值:prod 下必须显式提供,dev 默认密钥仅存在于 dev profile(application.yml)
  secret: ${JWT_SECRET}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
